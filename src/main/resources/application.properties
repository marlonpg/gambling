spring.application.name=race-to-the-moon
server.port=8080
management.endpoints.web.exposure.include=health,info

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:race_to_the_moon}
spring.datasource.username=${DB_USER:moon}
spring.datasource.password=${DB_PASSWORD:moonpass}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
